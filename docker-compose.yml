version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: lily-mongodb
    ports:
      - "27020:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-changeme}
    volumes:
      - mongodb_data:/data/db
    networks:
      - lily-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lily-backend
    ports:
      - "8055:8052"
    env_file:
      - .env
    depends_on:
      - mongodb
    networks:
      - lily-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lily-frontend
    ports:
      - "4043:3000"
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - lily-network

networks:
  lily-network:
    driver: bridge

volumes:
  mongodb_data:
